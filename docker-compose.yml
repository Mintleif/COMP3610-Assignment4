services:
  api:
    build: .
    ports:
      - "8000:8000"
    #environment:
      #Directs the API to pull models from the MLflow container via networking magic 
      #- MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      #shares project files with the container so it can access the model artifacts and app code
      - .:/app
    depends_on:
      - mlflow
    healthcheck:
      # Uses python to ping the health endpoint instead of curl
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    #Starts the tracking server and explicitly tells Docker to read from the mounted mlruns folder
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --backend-store-uri file:///mlruns 
      --default-artifact-root file:///mlartifacts 
      --allowed-hosts "*"
    volumes:
      #Mounts your local tracking data so the API can access your registered model
      - ./mlruns:/mlruns
      - ./mlartifacts:/mlartifacts